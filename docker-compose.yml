
services:
  backend:
    build:
      context: ./backend
    working_dir: /ticket-api
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host=0.0.0.0 --port=8000"
    ports:
      - ${BACKEND_HOST_PORT:-8000}:8000
    env_file: ./backend/.env
    volumes:
      - ./backend/db_data:/ticket-api/db_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - ${NGINX_HTTP_HOST_PORT:-80}:80/tcp
    env_file: ./frontend/.env
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "service", "nginx", "status" ]
      interval: 10s
      timeout: 5s
      retries: 3
